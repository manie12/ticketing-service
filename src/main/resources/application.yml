spring:
  application:
   name: ticketing
   kafka:
     bootstrap-servers: localhost:9092
     consumer:
       group-id: ticketing-service
       auto-offset-reset: earliest
       properties:
         spring.json.trusted.packages: "com.tekset.ticketing.*"
     producer:
       properties:
         spring.json.add.type.headers: true

     topics:
       product-events: product-events
